name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - bun_target: bun-darwin-arm64
            asset: darwin-arm64
          - bun_target: bun-darwin-x64
            asset: darwin-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun test

      - run: bun build src/index.ts --compile --target ${{ matrix.bun_target }} --outfile granola-${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: granola-${{ matrix.asset }}
          path: granola-${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release create ${{ github.ref_name }} granola-darwin-* --title "${{ github.ref_name }}" --generate-notes
