name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - bun_target: bun-darwin-arm64
            asset: darwin-arm64
          - bun_target: bun-darwin-x64
            asset: darwin-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun test

      - run: bun build src/index.ts --compile --target ${{ matrix.bun_target }} --outfile granola-${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: granola-${{ matrix.asset }}
          path: granola-${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release create ${{ github.ref_name }} granola-darwin-* --title "${{ github.ref_name }}" --generate-notes

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SHA_ARM64=$(sha256sum granola-darwin-arm64 | cut -d' ' -f1)
          SHA_X64=$(sha256sum granola-darwin-x64 | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/cchiles/homebrew-tap.git tap
          cd tap

          cat > Formula/granola.rb << FORMULA
          class Granola < Formula
            desc "CLI for Granola meeting notes"
            homepage "https://github.com/cchiles/granola-cli"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/cchiles/granola-cli/releases/download/v#{version}/granola-darwin-arm64"
                sha256 "${SHA_ARM64}"
              else
                url "https://github.com/cchiles/granola-cli/releases/download/v#{version}/granola-darwin-x64"
                sha256 "${SHA_X64}"
              end
            end

            def install
              binary = Hardware::CPU.arm? ? "granola-darwin-arm64" : "granola-darwin-x64"
              bin.install binary => "granola"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/granola --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/granola.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/granola.rb
          git commit -m "Update granola to ${VERSION}"
          git push
